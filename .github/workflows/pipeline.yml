name: MaríliaBot Pipeline

on:
  schedule:
    # Roda todo dia às 6h (horário de Brasília = 9h UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Permite rodar manualmente

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  TOCA_SUPABASE_URL: ${{ secrets.TOCA_SUPABASE_URL }}
  TOCA_ANON_KEY: ${{ secrets.TOCA_ANON_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  MAX_PAGES_PER_SPIDER: '20'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      # Phase 1: Collect (6 sources)
      - name: Collect — APIs (União + Toca)
        run: python -m src.main collect uniao toca

      - name: Collect — HTML scrapers
        run: python -m src.main collect vivareal chavesnamao imovelweb zapimoveis
        continue-on-error: true

      # Phase 2: Normalize + Classify + Enrich
      - name: Normalize (+ deactivate stale)
        run: python -m src.main normalize

      - name: Classify
        run: python -m src.main classify

      - name: Enrich (LLM)
        if: env.GEMINI_API_KEY != ''
        run: python -m src.main enrich-llm
        continue-on-error: true

      # Phase 3: Deduplicate
      - name: Deduplicate
        run: python -m src.main dedup

      # Phase 4: Analyze + Intelligence
      - name: Analyze
        run: python -m src.main analyze

      - name: Trends
        run: python -m src.main trends

      - name: Sales Tracker
        run: python -m src.main sales
        continue-on-error: true

      - name: Market Heat
        run: python -m src.main heat
        continue-on-error: true

      # Phase 5: Score + Risk + Viability
      - name: Hunt
        run: python -m src.main hunt

      - name: Score (LLM)
        if: env.GEMINI_API_KEY != ''
        run: python -m src.main score-llm
        continue-on-error: true

      - name: Risk Assessment
        if: env.GEMINI_API_KEY != ''
        run: python -m src.main risk
        continue-on-error: true

      - name: Viability
        run: python -m src.main viability
        continue-on-error: true

      - name: Comparables
        run: python -m src.main comps
        continue-on-error: true

      # Notificações movidas para weekly-report.yml (segunda-feira 9h BRT)
      # Pipeline diário só coleta e processa dados silenciosamente
